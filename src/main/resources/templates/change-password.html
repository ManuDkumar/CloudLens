<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/common-head :: meta}"></th:block>
    <title>CloudLens | Change Password</title>
    <th:block th:replace="~{fragments/common-head :: bootstrap-css}"></th:block>
    <th:block th:replace="~{fragments/common-head :: bootstrap-icons}"></th:block>
    <th:block th:replace="~{fragments/dashboard-styles :: auth-css}"></th:block>
</head>
<body>

<div th:if="${message}" class="toast-container">
    <div class="toast toast-custom show">
        <div class="toast-header"><strong class="me-auto" style="color:#00c853;"><i class="bi bi-check-circle-fill me-1" style="color:#00c853;"></i> Success</strong><button type="button" class="btn-close" data-bs-dismiss="toast"></button></div>
        <div class="toast-body" th:text="${message}"></div>
    </div>
</div>
<div th:if="${error}" class="toast-container">
    <div class="toast toast-custom show">
        <div class="toast-header"><strong class="me-auto" style="color:#ff5252;"><i class="bi bi-x-circle-fill me-1" style="color:#ff5252;"></i> Error</strong><button type="button" class="btn-close" data-bs-dismiss="toast"></button></div>
        <div class="toast-body" th:text="${error}"></div>
    </div>
</div>

<div class="auth-card">
    <div class="brand">
        <i class="bi bi-shield-lock-fill"></i>
        <h2>Change Password</h2>
        <p>Update your account password</p>
    </div>
    <form method="post" th:action="@{/change-password}">
        <div class="mb-3">
            <label class="form-label fw-semibold">Current Password</label>
            <input type="password" class="form-control" name="currentPassword" placeholder="Enter current password" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">New Password</label>
            <input type="password" class="form-control" name="newPassword" placeholder="Enter new password" required minlength="4">
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Confirm New Password</label>
            <input type="password" class="form-control" name="confirmPassword" placeholder="Confirm new password" required minlength="4">
        </div>
        <button type="submit" class="btn-submit"><i class="bi bi-check-lg me-2"></i>Update Password</button>
    </form>
    <div class="footer-text">
        <a href="/"><i class="bi bi-arrow-left me-1"></i>Back to Dashboard</a>
    </div>
</div>
<th:block th:replace="~{fragments/common-head :: bootstrap-js}"></th:block>
<script>
    setTimeout(function() {
        document.querySelectorAll('.toast-custom').forEach(t => {
            setTimeout(() => {
                t.style.animation = 'fadeOut 0.4s ease forwards';
                setTimeout(() => t.classList.remove('show'), 400);
            }, 3000);
        });
    }, 500);
</script>
</body>
</html>
