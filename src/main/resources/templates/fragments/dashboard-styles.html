<style th:fragment="dashboard-css">
    :root {
        --gradient-start: #0f0c29;
        --gradient-mid: #302b63;
        --gradient-end: #24243e;
        --accent: #7c4dff;
        --accent-light: #b388ff;
        --card-bg: #ffffff;
        --text-dark: #1a1a2e;
        --text-muted: #6c757d;
        --border-light: #e8e8f0;
    }

    body {
        background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-mid) 50%, var(--gradient-end) 100%);
        min-height: 100vh;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .navbar {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .navbar-brand { font-weight: 700; font-size: 1.4rem; color: #fff !important; letter-spacing: -0.5px; }
    .navbar-brand i { color: var(--accent-light); margin-right: 8px; }
    .navbar-text { color: rgba(255, 255, 255, 0.6); font-size: 0.85rem; }

    .hero-section { padding: 2rem 0 1rem; text-align: center; }

    .hero-title {
        font-size: 2.5rem; font-weight: 800; color: #fff;
        letter-spacing: -1px; margin-bottom: 0.5rem;
    }

    .hero-title span {
        background: linear-gradient(135deg, var(--accent-light), #e040fb);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .hero-subtitle { color: rgba(255, 255, 255, 0.6); font-size: 1.1rem; font-weight: 400; margin-bottom: 0; }

    .main-card {
        background: var(--card-bg); border: none; border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); overflow: hidden;
    }

    .upload-area {
        background: linear-gradient(135deg, #f8f9ff 0%, #f0f0ff 100%);
        border: 2px dashed var(--accent); border-radius: 16px;
        padding: 2.5rem 2rem; text-align: center;
        transition: all 0.3s ease; cursor: pointer; position: relative;
    }

    .upload-area:hover {
        border-color: var(--accent-light);
        background: linear-gradient(135deg, #f0f0ff 0%, #e8e0ff 100%);
        transform: translateY(-1px);
    }

    .upload-area .upload-icon { font-size: 3rem; color: var(--accent); margin-bottom: 0.75rem; }
    .upload-area h5 { font-weight: 600; color: var(--text-dark); }
    .upload-area p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0; }
    .upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    .section-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 1.5rem 1.5rem 0.75rem; border-bottom: 1px solid var(--border-light);
    }

    .section-header h5 { font-weight: 700; color: var(--text-dark); margin: 0; }
    .section-header h5 i { color: var(--accent); margin-right: 8px; }
    .section-header .badge-count {
        background: linear-gradient(135deg, var(--accent), var(--accent-light));
        color: #fff; font-weight: 600; font-size: 0.75rem;
        padding: 0.25em 0.75em; border-radius: 50px;
    }

    .file-table { margin: 0; }
    .file-table thead th {
        background: #f8f9ff; border-bottom: 2px solid var(--border-light);
        color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase;
        letter-spacing: 0.5px; padding: 0.75rem 1rem; font-weight: 700;
    }
    .file-table tbody tr { transition: background 0.2s ease; }
    .file-table tbody tr:hover { background: #f8f9ff; }
    .file-table tbody td { padding: 0.9rem 1rem; vertical-align: middle; border-bottom: 1px solid var(--border-light); font-size: 0.9rem; }

    .file-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: #fff; flex-shrink: 0; }
    .file-icon.image { background: linear-gradient(135deg, #e040fb, #7c4dff); }
    .file-icon.pdf { background: linear-gradient(135deg, #ff5252, #d50000); }
    .file-icon.document { background: linear-gradient(135deg, #448aff, #2962ff); }
    .file-icon.archive { background: linear-gradient(135deg, #ffab40, #ff6d00); }
    .file-icon.video { background: linear-gradient(135deg, #69f0ae, #00c853); }
    .file-icon.audio { background: linear-gradient(135deg, #e040fb, #aa00ff); }
    .file-icon.code { background: linear-gradient(135deg, #00e5ff, #0091ea); }
    .file-icon.default { background: linear-gradient(135deg, #90a4ae, #546e7a); }

    .file-name { font-weight: 600; color: var(--text-dark); display: block; line-height: 1.2; }
    .file-ext { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }
    .file-desc { color: var(--text-muted); font-size: 0.85rem; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-size { font-weight: 500; color: var(--text-dark); font-size: 0.85rem; }
    .file-date { color: var(--text-muted); font-size: 0.85rem; }

    .btn-download {
        background: linear-gradient(135deg, var(--accent), var(--accent-light));
        border: none; color: #fff; border-radius: 8px;
        padding: 0.4rem 1rem; font-size: 0.8rem; font-weight: 600;
        transition: all 0.3s ease;
    }
    .btn-download:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(124, 77, 255, 0.4); color: #fff; }

    .btn-upload-submit {
        background: linear-gradient(135deg, var(--accent), var(--accent-light));
        border: none; color: #fff; border-radius: 10px;
        padding: 0.7rem 2rem; font-weight: 600; font-size: 0.95rem;
        transition: all 0.3s ease; width: 100%;
    }
    .btn-upload-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124, 77, 255, 0.35); color: #fff; }

    .empty-state { padding: 4rem 2rem; text-align: center; }
    .empty-state .empty-icon { font-size: 4rem; color: #d0d0e0; margin-bottom: 1rem; }
    .empty-state h5 { color: var(--text-dark); font-weight: 600; }
    .empty-state p { color: var(--text-muted); font-size: 0.9rem; max-width: 360px; margin: 0 auto; }

    .footer-text { text-align: center; color: rgba(255, 255, 255, 0.4); font-size: 0.8rem; padding: 2rem 0; }

    .form-control, .form-control:focus { border-radius: 10px; border: 2px solid var(--border-light); box-shadow: none; padding: 0.6rem 1rem; font-size: 0.9rem; }
    .form-control:focus { border-color: var(--accent); }

    .search-bar { border-radius: 10px; border: 2px solid var(--border-light); padding: 0.6rem 1rem 0.6rem 2.5rem; font-size: 0.9rem; background: #f8f9ff; transition: all 0.3s ease; }
    .search-bar:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.1); }
    .search-wrapper { position: relative; }
    .search-wrapper .bi-search { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    .search-wrapper .bi-x-circle-fill { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); cursor: pointer; display: none; }
    .search-wrapper .bi-x-circle-fill:hover { color: var(--accent); }

    .file-thumb { width: 40px; height: 40px; border-radius: 10px; object-fit: cover; cursor: pointer; transition: transform 0.2s ease; }
    .file-thumb:hover { transform: scale(1.1); }

    .file-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }

    .bulk-bar { display: none; align-items: center; gap: 0.5rem; padding: 0.5rem 1.5rem; background: #f0f0ff; border-bottom: 1px solid var(--border-light); }
    .bulk-bar.show { display: flex; }
    .bulk-bar .selected-count { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }
    .btn-bulk-delete { background: #ff5252; border: none; color: #fff; border-radius: 8px; padding: 0.3rem 1rem; font-size: 0.8rem; font-weight: 600; transition: all 0.3s ease; }
    .btn-bulk-delete:hover { background: #d50000; color: #fff; }

    .btn-edit { border: 1px solid var(--accent); color: var(--accent); border-radius: 8px; padding: 0.4rem 0.8rem; font-size: 0.8rem; font-weight: 600; background: transparent; transition: all 0.3s ease; }
    .btn-edit:hover { background: var(--accent); color: #fff; }

    .pagination-custom { margin: 0; padding: 1rem 1.5rem; justify-content: center; }
    .pagination-custom .page-link { border: none; color: var(--text-muted); font-weight: 600; padding: 0.5rem 0.9rem; border-radius: 8px !important; margin: 0 2px; font-size: 0.85rem; }
    .pagination-custom .page-link:hover { background: #f0f0ff; color: var(--accent); }
    .pagination-custom .active .page-link { background: linear-gradient(135deg, var(--accent), var(--accent-light)); color: #fff; }
    .pagination-custom .disabled .page-link { opacity: 0.4; pointer-events: none; }

    .preview-modal .modal-content { border: none; border-radius: 16px; overflow: hidden; background: transparent; box-shadow: none; }
    .preview-modal .modal-body { padding: 0; text-align: center; }
    .preview-modal img { max-width: 100%; max-height: 80vh; border-radius: 12px; }
    .preview-modal .btn-close { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); color: #fff; border-radius: 50%; padding: 8px; opacity: 1; }

    .edit-modal .modal-content { border: none; border-radius: 16px; overflow: hidden; }
    .edit-modal .modal-header { background: linear-gradient(135deg, var(--gradient-start), var(--gradient-mid)); color: #fff; border: none; padding: 1.2rem 1.5rem; }
    .edit-modal .modal-header .btn-close { filter: invert(1); }
    .edit-modal .modal-body { padding: 1.5rem; }

    .toast-container { position: fixed; top: 1.5rem; right: 1.5rem; z-index: 9999; }
    .toast-custom { background: #fff; border: none; border-radius: 12px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15); min-width: 320px; animation: slideIn 0.4s ease; }
    .toast-custom .toast-header { border-bottom: none; background: transparent; padding: 1rem 1rem 0; }
    .toast-custom .toast-body { padding: 0.5rem 1rem 1rem; font-size: 0.9rem; }
    .toast-custom .icon-success { color: #00c853; font-size: 1.2rem; margin-right: 8px; }
    .toast-custom .icon-error { color: #ff5252; font-size: 1.2rem; margin-right: 8px; }

    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

    @media (max-width: 768px) {
        .hero-title { font-size: 1.8rem; }
        .file-table { font-size: 0.85rem; }
        .file-desc { max-width: 120px; }
        .section-header { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
    }
</style>

<style th:fragment="auth-css">
    body {
        background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        min-height: 100vh; display: flex; align-items: center; justify-content: center;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .auth-card {
        background: #fff; border: none; border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 2.5rem;
        width: 100%; max-width: 420px;
    }
    .auth-card .brand { text-align: center; margin-bottom: 2rem; }
    .auth-card .brand i { font-size: 2.5rem; color: #7c4dff; }
    .auth-card .brand h2 { font-weight: 800; color: #1a1a2e; margin-top: 0.5rem; }
    .auth-card .brand p { color: #6c757d; font-size: 0.9rem; }
    .auth-card .form-control { border-radius: 10px; border: 2px solid #e8e8f0; padding: 0.7rem 1rem; font-size: 0.9rem; }
    .auth-card .form-control:focus { border-color: #7c4dff; box-shadow: 0 0 0 3px rgba(124,77,255,0.1); }
    .auth-card .btn-submit { background: linear-gradient(135deg, #7c4dff, #b388ff); border: none; color: #fff; border-radius: 10px; padding: 0.7rem; font-weight: 600; width: 100%; transition: all 0.3s ease; }
    .auth-card .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,77,255,0.35); }
    .auth-card .footer-text { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: #6c757d; }
    .auth-card .footer-text a { color: #7c4dff; text-decoration: none; font-weight: 600; }
    .alert-custom { border-radius: 10px; font-size: 0.85rem; }
</style>
