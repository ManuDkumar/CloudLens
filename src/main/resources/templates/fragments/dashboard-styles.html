<style th:fragment="dashboard-css">
    :root {
        --bg: #0f172a;
        --bg-card: #1e293b;
        --accent: #0891b2;
        --accent-hover: #0ea5c4;
        --card-bg: #ffffff;
        --text-dark: #1e293b;
        --text-muted: #64748b;
        --border-light: #e2e8f0;
    }

    body {
        background: var(--bg);
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .navbar {
        background: var(--bg-card);
        border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .navbar-brand { font-weight: 700; font-size: 1.3rem; color: #fff !important; }
    .navbar-brand i { color: var(--accent); margin-right: 6px; }
    .navbar-text { color: rgba(255, 255, 255, 0.55); font-size: 0.85rem; }

    .hero-section { padding: 2rem 0 1rem; text-align: center; }

    .hero-title { font-size: 2rem; font-weight: 700; color: #fff; margin-bottom: 0.4rem; }
    .hero-title span { color: var(--accent); }
    .hero-subtitle { color: rgba(255, 255, 255, 0.5); font-size: 1rem; margin-bottom: 0; }

    .main-card {
        background: var(--card-bg); border: none; border-radius: 14px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.2); overflow: hidden;
    }

    .upload-area {
        background: #f8fafc;
        border: 2px dashed var(--accent); border-radius: 12px;
        padding: 2rem; text-align: center; cursor: pointer; position: relative;
    }

    .upload-area:hover { border-color: var(--accent-hover); background: #f0f9ff; }
    .upload-area .upload-icon { font-size: 2.5rem; color: var(--accent); margin-bottom: 0.5rem; }
    .upload-area h5 { font-weight: 600; color: var(--text-dark); font-size: 1rem; }
    .upload-area p { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0; }
    .upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    .section-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 1.25rem 1.5rem 0.75rem; border-bottom: 1px solid var(--border-light);
    }

    .section-header h5 { font-weight: 700; color: var(--text-dark); margin: 0; font-size: 1rem; }
    .section-header h5 i { color: var(--accent); margin-right: 6px; }
    .section-header .badge-count {
        background: var(--accent); color: #fff; font-weight: 600; font-size: 0.75rem;
        padding: 0.2em 0.75em; border-radius: 50px;
    }

    .file-table { margin: 0; }
    .file-table thead th {
        background: #f8fafc; border-bottom: 2px solid var(--border-light);
        color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase;
        letter-spacing: 0.5px; padding: 0.75rem 1rem; font-weight: 700;
    }
    .file-table tbody tr:hover { background: #f8fafc; }
    .file-table tbody td { padding: 0.85rem 1rem; vertical-align: middle; border-bottom: 1px solid var(--border-light); font-size: 0.9rem; }

    .file-icon { width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: #fff; flex-shrink: 0; }
    .file-icon.image { background: #0891b2; }
    .file-icon.pdf { background: #e53935; }
    .file-icon.document { background: #1e88e5; }
    .file-icon.archive { background: #fb8c00; }
    .file-icon.video { background: #43a047; }
    .file-icon.audio { background: #7b1fa2; }
    .file-icon.code { background: #00acc1; }
    .file-icon.default { background: #78909c; }

    .file-name { font-weight: 600; color: var(--text-dark); display: block; line-height: 1.2; }
    .file-ext { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }
    .file-desc { color: var(--text-muted); font-size: 0.85rem; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-size { font-weight: 500; color: var(--text-dark); font-size: 0.85rem; }
    .file-date { color: var(--text-muted); font-size: 0.85rem; }

    .btn-download {
        background: var(--accent); border: none; color: #fff; border-radius: 6px;
        padding: 0.35rem 0.9rem; font-size: 0.8rem; font-weight: 600;
    }
    .btn-download:hover { background: var(--accent-hover); color: #fff; }

    .btn-upload-submit {
        background: var(--accent); border: none; color: #fff; border-radius: 8px;
        padding: 0.65rem 2rem; font-weight: 600; font-size: 0.95rem; width: 100%;
    }
    .btn-upload-submit:hover { background: var(--accent-hover); color: #fff; }

    .empty-state { padding: 3rem 2rem; text-align: center; }
    .empty-state .empty-icon { font-size: 3rem; color: #c0c0d0; margin-bottom: 0.75rem; }
    .empty-state h5 { color: var(--text-dark); font-weight: 600; }
    .empty-state p { color: var(--text-muted); font-size: 0.9rem; max-width: 360px; margin: 0 auto; }

    .footer-text { text-align: center; color: rgba(255, 255, 255, 0.35); font-size: 0.8rem; padding: 2rem 0; }

    .form-control, .form-control:focus { border-radius: 8px; border: 2px solid var(--border-light); box-shadow: none; padding: 0.6rem 1rem; font-size: 0.9rem; }
    .form-control:focus { border-color: var(--accent); }

    .search-bar { border-radius: 8px; border: 2px solid var(--border-light); padding: 0.5rem 1rem 0.5rem 2.3rem; font-size: 0.9rem; background: #f8f9ff; }
    .search-bar:focus { border-color: var(--accent); background: #fff; }
    .search-wrapper { position: relative; }
    .search-wrapper .bi-search { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    .search-wrapper .bi-x-circle-fill { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); cursor: pointer; display: none; }
    .search-wrapper .bi-x-circle-fill:hover { color: var(--accent); }

    .file-thumb { width: 38px; height: 38px; border-radius: 8px; object-fit: cover; cursor: pointer; }
    .file-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }

    .bulk-bar { display: none; align-items: center; gap: 0.5rem; padding: 0.5rem 1.5rem; background: #e0f7fa; border-bottom: 1px solid var(--border-light); }
    .bulk-bar.show { display: flex; }
    .bulk-bar .selected-count { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }
    .btn-bulk-delete { background: #e53935; border: none; color: #fff; border-radius: 6px; padding: 0.3rem 0.9rem; font-size: 0.8rem; font-weight: 600; }
    .btn-bulk-delete:hover { background: #c62828; color: #fff; }

    .btn-edit { border: 1px solid var(--accent); color: var(--accent); border-radius: 6px; padding: 0.35rem 0.7rem; font-size: 0.8rem; font-weight: 600; background: transparent; }
    .btn-edit:hover { background: var(--accent); color: #fff; }

    .pagination-custom { margin: 0; padding: 1rem 1.5rem; justify-content: center; }
    .pagination-custom .page-link { border: none; color: var(--text-muted); font-weight: 600; padding: 0.4rem 0.8rem; border-radius: 6px !important; margin: 0 2px; font-size: 0.85rem; }
    .pagination-custom .page-link:hover { background: #e0f7fa; color: var(--accent); }
    .pagination-custom .active .page-link { background: var(--accent); color: #fff; }
    .pagination-custom .disabled .page-link { opacity: 0.4; pointer-events: none; }

    .preview-modal .modal-content { border: none; border-radius: 12px; overflow: hidden; background: transparent; }
    .preview-modal .modal-body { padding: 0; text-align: center; }
    .preview-modal img { max-width: 100%; max-height: 80vh; border-radius: 10px; }
    .preview-modal .btn-close { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); border-radius: 50%; padding: 8px; opacity: 1; }

    .edit-modal .modal-content { border: none; border-radius: 12px; overflow: hidden; }
    .edit-modal .modal-header { background: var(--bg-card); color: #fff; border: none; padding: 1rem 1.5rem; }
    .edit-modal .modal-header .btn-close { filter: invert(1); }
    .edit-modal .modal-body { padding: 1.5rem; }

    .toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 9999; }
    .toast-custom { background: #fff; border: none; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); min-width: 300px; }
    .toast-custom .toast-header { border-bottom: none; background: transparent; padding: 0.85rem 1rem 0; }
    .toast-custom .toast-body { padding: 0.4rem 1rem 0.85rem; font-size: 0.9rem; }

    @media (max-width: 768px) {
        .hero-title { font-size: 1.5rem; }
        .file-desc { max-width: 100px; }
        .section-header { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
    }
</style>

<style th:fragment="auth-css">
    :root {
        --bg: #0f172a;
        --accent: #0891b2;
        --accent-hover: #0ea5c4;
        --text-dark: #1e293b;

        --border-light: #e2e8f0;
    }

        background: var(--bg); min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;

    .auth-card {
        background: #fff; border: none; border-radius: 14px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.25); padding: 2rem;
        width: 100%; max-width: 400px;
    }
    .auth-card .brand { text-align: center; margin-bottom: 1.5rem; }
    .auth-card .brand i { font-size: 2rem; color: var(--accent); }
    .auth-card .brand h2 { font-weight: 700; color: var(--text-dark); margin-top: 0.4rem; font-size: 1.5rem; }
    .auth-card .brand p { color: var(--text-muted); font-size: 0.85rem; }
    .auth-card .form-control { border-radius: 8px; border: 2px solid var(--border-light); padding: 0.65rem 1rem; font-size: 0.9rem; }
    .auth-card .form-control:focus { border-color: var(--accent); box-shadow: none; }
    .auth-card .btn-submit { background: var(--accent); border: none; color: #fff; border-radius: 8px; padding: 0.65rem; font-weight: 600; width: 100%; }
    .auth-card .btn-submit:hover { background: var(--accent-hover); }
    .auth-card .footer-text { text-align: center; margin-top: 1.25rem; font-size: 0.85rem; color: var(--text-muted); }
    .auth-card .footer-text a { color: var(--accent); text-decoration: none; font-weight: 600; }
</style>
