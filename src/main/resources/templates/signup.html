<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/common-head :: meta}"></th:block>
    <title>CloudLens | Sign Up</title>
    <th:block th:replace="~{fragments/common-head :: bootstrap-css}"></th:block>
    <th:block th:replace="~{fragments/common-head :: bootstrap-icons}"></th:block>
    <th:block th:replace="~{fragments/dashboard-styles :: auth-css}"></th:block>
</head>
<body>

<div th:if="${error}" class="toast-container">
    <div class="toast toast-custom show">
        <div class="toast-header"><strong class="me-auto" style="color:#ff5252;"><i class="bi bi-x-circle-fill me-1" style="color:#ff5252;"></i> Error</strong><button type="button" class="btn-close" data-bs-dismiss="toast"></button></div>
        <div class="toast-body" th:text="${error}"></div>
    </div>
</div>

<div class="auth-card">
    <div class="brand">
        <i class="bi bi-cloud-arrow-up-fill"></i>
        <h2>Create Account</h2>
        <p>Join CloudLens to manage your files</p>
    </div>
    <form method="post" action="/signup">
        <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" class="form-control" name="username" placeholder="Choose a username" required minlength="3">
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" class="form-control" name="password" placeholder="Choose a password" required minlength="4">
        </div>
        <button type="submit" class="btn-submit"><i class="bi bi-person-plus me-2"></i>Create Account</button>
    </form>
    <div class="footer-text">
        Already have an account? <a href="/login">Sign in</a>
    </div>
</div>
<th:block th:replace="~{fragments/common-head :: bootstrap-js}"></th:block>
<script>
    setTimeout(function() {
        document.querySelectorAll('.toast-custom').forEach(t => {
            setTimeout(() => {
                t.style.animation = 'fadeOut 0.4s ease forwards';
                setTimeout(() => t.classList.remove('show'), 400);
            }, 3000);
        });
    }, 500);
</script>
</body>
</html>
