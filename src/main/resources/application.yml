server:
  port: 8081

spring:
  profiles:
    include: local
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/cloudlens}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

cloud:
  storage:
    bucket-name: ${S3_BUCKET_NAME:cloudlens-metadata-bucket}
    region: ${AWS_REGION:eu-north-1}
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}

logging:
  level:
    root: INFO
    com.cloudlens: DEBUG
